project:
  type: website
  resources:
    - cv.pdf
    - assets/**

website:
  title: "Marin Girard"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "CV"
        href: cv.pdf

format:
  html:
    theme: lumen
    toc: true
    include-in-header:
      text: |
        <script>
        document.addEventListener("DOMContentLoaded", function () {
          const cvLinks = document.querySelectorAll('a[href$="cv.pdf"]');
          cvLinks.forEach((link) => {
            link.setAttribute("download", "Marin-Girard-CV.pdf");
          });
        });
        </script>